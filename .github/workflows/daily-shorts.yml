name: 🎬 每日 Shorts 自動生產線

on:
  schedule:
    - cron: '11 0 * * *'   # 00:11 UTC = 08:11 台灣，每日
  workflow_dispatch:  # 也可手動觸發
    inputs:
      videos:
        description: 'Number of videos to generate (YouTube quota ≈ 6 uploads/day max)'
        default: '2'

env:
  KLING_API_KEY: ${{ secrets.KLING_API_KEY }}
  YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
  YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
  YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  LLM_MODEL: gpt-4o
  VIDEOS_PER_DAY: ${{ github.event.inputs.videos || '2' }}

# don't let a manual dispatch collide with the scheduled run (avoids double uploads / wasted quota)
concurrency:
  group: daily-shorts
  cancel-in-progress: false

jobs:
  generate-and-upload:
    name: 生成 Shorts 並上傳 YouTube
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg curl
          pip install -r requirements.txt

      - name: 🎬 Run Pipeline
        id: pipeline
        run: python src/main.py
        env:
          KLING_API_KEY: ${{ secrets.KLING_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: 📬 Discord Notification
        if: always()
        run: python src/discord_notify.py
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PIPELINE_STATUS: ${{ job.status }}

      - name: 📤 Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-shorts-output
          path: output/
          retention-days: 7

      - name: 📊 Summary
        if: always()
        run: |
          echo "=== Daily Shorts Pipeline ==="
          echo "Date: $(date '+%Y-%m-%d %H:%M')"
          echo "Status: ${{ job.status }}"
          if [ -f output/summary.json ]; then
            python3 src/discord_notify.py --print-summary
          fi

  fallback:
    name: 📝 Fallback Prompts
    needs: generate-and-upload
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          pip install pyyaml openai requests yt-dlp
          echo "=== Fallback: Last trend data ==="
          cat data/trending_analysis.json 2>/dev/null | python3 -m json.tool 2>/dev/null || echo "No trend data available"
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

  notify-failure:
    needs: [generate-and-upload, fallback]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Discord failure alert
        run: >-
          curl -sf -H "Content-Type: application/json"
          -d '{"content": "\ud83d\udd34 ${{ github.repository }} \u2014 ${{ github.workflow }} \u6392\u7a0b\u5931\u6557 \u00b7 ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}'
          "${{ secrets.DISCORD_WEBHOOK }}" || true
